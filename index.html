<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nichola & Luca — Save the Date · 5 June 2027 · Malta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Great+Vibes&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:      #f7f1e1;
    --cream-deep: #efe6cf;
    --lemon:      #e8b22e;
    --lemon-soft: #f4d27a;
    --sienna:     #9a3d28;
    --sienna-dk:  #7d2f1d;
    --olive:      #6f7d44;
    --olive-dk:   #586437;
    --fuchsia:    #bd3169;
    --ink:        #4a3a28;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--cream);
    font-family: 'Montserrat', sans-serif;
    color: var(--ink);
    overflow-x: hidden;
  }

  /* ════════ HERO — FULL SCREEN ════════ */
  .hero {
    position: relative;
    min-height: 100vh;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    text-align: center;
    overflow: hidden;
    padding: 0 24px 90px;
  }

  /* Subtle couple photo as atmospheric background outline */
  .photo-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
    background-image: url('couple.jpg');
    background-size: cover;
    background-position: center 30%;
    opacity: 0.09;
    filter: saturate(0.8) contrast(0.95);
    pointer-events: none;
  }
  /* Cream wash so the photo stays a faint outline, never competing with text */
  .photo-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at center,
        rgba(247, 241, 225, 0.45) 0%,
        rgba(247, 241, 225, 0.78) 60%,
        rgba(247, 241, 225, 0.92) 100%);
  }

  /* Warm Mediterranean sun glow behind names */
  .sun {
    position: absolute;
    top: 62%;
    left: 50%;
    width: min(620px, 85vw);
    height: min(620px, 85vw);
    transform: translate(-50%, -50%);
    background: radial-gradient(circle,
      rgba(244, 210, 122, 0.55) 0%,
      rgba(232, 178, 46, 0.18) 38%,
      rgba(247, 241, 225, 0) 68%);
    z-index: 0;
    pointer-events: none;
    animation: sunPulse 9s ease-in-out infinite;
  }
  @keyframes sunPulse {
    0%, 100% { opacity: 0.85; transform: translate(-50%, -50%) scale(1); }
    50%      { opacity: 1;    transform: translate(-50%, -50%) scale(1.05); }
  }

  /* Watercolour floral garland — full width, in-flow at the top so text never overlaps */
  .floral-garland {
    display: block;
    width: 100%;
    /* Pull edge-to-edge past the hero's horizontal padding */
    margin: 0 -24px;
    width: calc(100% + 48px);
    max-width: none;
    height: auto;
    position: relative;
    z-index: 1;
    pointer-events: none;
    opacity: 0.95;
    /* Negative bottom margin lets the text tuck slightly up into the transparent
       cream arch area, without overlapping actual flowers */
    margin-bottom: -8vw;
  }

  /* Hero text */
  .hero-inner {
    position: relative;
    z-index: 3;
    opacity: 0;
    transform: translateY(18px);
    animation: rise 1.4s cubic-bezier(.2,.7,.3,1) 0.3s forwards;
  }
  @keyframes rise {
    to { opacity: 1; transform: translateY(0); }
  }

  .eyebrow {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(26px, 5vw, 52px);
    font-weight: 500;
    font-style: italic;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--olive-dk);
    margin-bottom: clamp(18px, 3vh, 34px);
    padding-left: 0.22em;
  }
  .eyebrow::after {
    content: '';
    display: block;
    width: clamp(60px, 10vw, 110px);
    height: 2px;
    background: var(--lemon);
    margin: clamp(12px, 1.6vh, 18px) auto 0;
    opacity: 0.85;
  }

  .names {
    font-family: 'Great Vibes', cursive;
    color: var(--sienna);
    line-height: 0.98;
  }
  .name { font-size: clamp(64px, 13vw, 150px); display: block; }
  .amp {
    font-size: clamp(40px, 7vw, 80px);
    display: block;
    margin: clamp(-4px, -0.5vh, 0px) 0;
    color: var(--lemon);
  }

  .lemon-rule {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin: clamp(20px, 4vh, 40px) 0 clamp(14px, 2.5vh, 24px);
  }
  .lemon-rule .line {
    height: 1px;
    width: clamp(50px, 12vw, 120px);
    background: linear-gradient(to right, transparent, var(--lemon), transparent);
  }
  .lemon-rule .dot {
    width: 9px; height: 9px;
    border-radius: 50% 0 50% 50%;
    background: var(--lemon);
    transform: rotate(45deg);
  }

  .date {
    font-family: 'Montserrat', sans-serif;
    font-size: clamp(13px, 2vw, 17px);
    font-weight: 500;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--olive-dk);
    padding-left: 0.4em;
  }
  .place {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(15px, 2.2vw, 20px);
    font-style: italic;
    letter-spacing: 0.12em;
    color: var(--sienna-dk);
    margin-top: 10px;
  }

  /* Scroll cue */
  .scroll-cue {
    position: absolute;
    bottom: 26px; left: 50%;
    transform: translateX(-50%);
    z-index: 4;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 7px;
    color: var(--olive-dk);
    opacity: 0;
    animation: fadeIn 1s ease 1.8s forwards, bob 2.4s ease-in-out 2s infinite;
    text-decoration: none;
  }
  @keyframes fadeIn { to { opacity: 0.8; } }
  @keyframes bob {
    0%,100% { transform: translateX(-50%) translateY(0); }
    50%     { transform: translateX(-50%) translateY(7px); }
  }
  .scroll-cue span {
    font-family: 'Montserrat', sans-serif;
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }
  .scroll-cue .chev {
    width: 14px; height: 14px;
    border-right: 1.5px solid var(--olive-dk);
    border-bottom: 1.5px solid var(--olive-dk);
    transform: rotate(45deg);
  }
  /* Hide the scroll cue when the viewport is too short to fit it without overlap */
  @media (max-height: 640px) {
    .scroll-cue { display: none; }
  }

  /* ════════ COUNTDOWN SECTION ════════ */
  .countdown-section {
    position: relative;
    padding: clamp(60px, 10vh, 110px) 24px clamp(70px, 12vh, 130px);
    text-align: center;
    background:
      linear-gradient(to bottom, var(--cream) 0%, var(--cream-deep) 100%);
  }
  .section-label {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(20px, 3vw, 30px);
    color: var(--sienna);
    margin-bottom: clamp(28px, 5vh, 48px);
    letter-spacing: 0.04em;
  }
  .countdown {
    display: flex;
    justify-content: center;
    gap: clamp(10px, 3vw, 32px);
    flex-wrap: wrap;
    max-width: 640px;
    margin: 0 auto;
  }
  .cd-unit {
    min-width: clamp(72px, 18vw, 120px);
    padding: clamp(16px, 3vw, 28px) clamp(8px, 2vw, 18px);
    background: rgba(255, 253, 247, 0.7);
    border: 1px solid rgba(154, 61, 40, 0.18);
    border-radius: 3px;
  }
  .cd-num {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: clamp(38px, 8vw, 64px);
    line-height: 1;
    color: var(--sienna);
    display: block;
  }
  .cd-label {
    font-family: 'Montserrat', sans-serif;
    font-size: clamp(8px, 1.4vw, 10px);
    font-weight: 500;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--olive-dk);
    margin-top: 10px;
    display: block;
  }

  /* Decorative lemon branch divider */
  .branch {
    margin: clamp(44px, 7vh, 72px) auto 0;
    max-width: 200px;
    opacity: 0.7;
  }

  /* ════════ FOOTER NOTE ════════ */
  .footer {
    text-align: center;
    padding: clamp(40px, 7vh, 70px) 24px clamp(50px, 8vh, 80px);
    background: var(--cream-deep);
  }
  .footer-names {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(28px, 5vw, 42px);
    color: var(--sienna);
    margin-bottom: 10px;
  }
  .footer-sub {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(14px, 2vw, 17px);
    color: var(--olive-dk);
    letter-spacing: 0.08em;
  }

  /* Reveal on scroll */
  .reveal {
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 1s ease, transform 1s ease;
  }
  .reveal.in { opacity: 1; transform: translateY(0); }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
    .hero-inner, .scroll-cue, .reveal { opacity: 1 !important; transform: none !important; }
  }
</style>
</head>
<body>

  <!-- ════════ HERO ════════ -->
  <section class="hero">

    <div class="photo-bg"></div>
    <div class="sun"></div>

    <!-- Watercolour floral garland from the original card, framing the top -->
    <img class="floral-garland"
         src="floral-top.webp"
         alt="" aria-hidden="true">

    <div class="hero-inner">
      <p class="eyebrow">Save the Date</p>
      <div class="names">
        <span class="name">Nichola</span>
        <span class="amp">&amp;</span>
        <span class="name">Luca</span>
      </div>
      <div class="lemon-rule">
        <span class="line"></span>
        <span class="dot"></span>
        <span class="line"></span>
      </div>
      <p class="date">5 &nbsp;·&nbsp; June &nbsp;·&nbsp; 2027</p>
      <p class="place">Malta</p>
    </div>

    <a class="scroll-cue" href="#countdown" aria-label="Scroll to countdown">
      <span>Countdown</span>
      <span class="chev"></span>
    </a>

  </section>

  <!-- ════════ COUNTDOWN ════════ -->
  <section class="countdown-section" id="countdown">
    <h2 class="section-label reveal">Counting down to our wedding day</h2>

    <div class="countdown reveal">
      <div class="cd-unit"><span class="cd-num" id="cd-days">—</span><span class="cd-label">Days</span></div>
      <div class="cd-unit"><span class="cd-num" id="cd-hours">—</span><span class="cd-label">Hours</span></div>
      <div class="cd-unit"><span class="cd-num" id="cd-mins">—</span><span class="cd-label">Minutes</span></div>
      <div class="cd-unit"><span class="cd-num" id="cd-secs">—</span><span class="cd-label">Seconds</span></div>
    </div>

    <!-- lemon branch SVG divider -->
    <svg class="branch reveal" viewBox="0 0 200 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M10 20 H190" stroke="#6f7d44" stroke-width="1" opacity="0.5"/>
      <ellipse cx="100" cy="20" rx="11" ry="8" fill="#e8b22e"/>
      <ellipse cx="100" cy="20" rx="8" ry="6" fill="#f4d27a"/>
      <ellipse cx="78" cy="20" rx="9" ry="4" fill="#6f7d44" transform="rotate(-18 78 20)"/>
      <ellipse cx="122" cy="20" rx="9" ry="4" fill="#586437" transform="rotate(18 122 20)"/>
    </svg>
  </section>

  <!-- ════════ FOOTER ════════ -->
  <footer class="footer">
    <p class="footer-names reveal">Nichola &amp; Luca</p>
    <p class="footer-sub reveal">A formal invitation will follow · Malta, June 2027</p>
  </footer>

<script>
  function pad(n){ return String(n).padStart(2,'0'); }
  function tick(){
    var w = new Date('2027-06-05T11:00:00');
    var diff = w - new Date();
    if (diff <= 0){
      ['cd-days','cd-hours','cd-mins','cd-secs'].forEach(function(id){
        document.getElementById(id).textContent = '00';
      });
      return;
    }
    document.getElementById('cd-days').textContent  = Math.floor(diff/86400000);
    document.getElementById('cd-hours').textContent = pad(Math.floor((diff%86400000)/3600000));
    document.getElementById('cd-mins').textContent  = pad(Math.floor((diff%3600000)/60000));
    document.getElementById('cd-secs').textContent  = pad(Math.floor((diff%60000)/1000));
  }
  tick();
  setInterval(tick, 1000);

  // Scroll reveal
  var io = new IntersectionObserver(function(entries){
    entries.forEach(function(e){ if(e.isIntersecting) e.target.classList.add('in'); });
  }, { threshold: 0.15 });
  document.querySelectorAll('.reveal').forEach(function(el){ io.observe(el); });
</script>

</body>
</html>
