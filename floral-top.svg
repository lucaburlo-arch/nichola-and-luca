<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 380" preserveAspectRatio="xMidYMin slice">
  <defs>
    <radialGradient id="poppyR" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#f4a26a"/>
      <stop offset="55%" stop-color="#e8612a"/>
      <stop offset="100%" stop-color="#c9461c"/>
    </radialGradient>
    <radialGradient id="pinkR" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#f7c0cd"/>
      <stop offset="60%" stop-color="#ec90a4"/>
      <stop offset="100%" stop-color="#d4607c"/>
    </radialGradient>
    <radialGradient id="fuchsiaR" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#d8568f"/>
      <stop offset="60%" stop-color="#bd3169"/>
      <stop offset="100%" stop-color="#94234c"/>
    </radialGradient>
    <radialGradient id="marigoldR" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#f3b53e"/>
      <stop offset="55%" stop-color="#e08a1e"/>
      <stop offset="100%" stop-color="#bf6c12"/>
    </radialGradient>
    <radialGradient id="lemonR" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#f6e479"/>
      <stop offset="60%" stop-color="#e8cf3f"/>
      <stop offset="100%" stop-color="#cdaf24"/>
    </radialGradient>
    <radialGradient id="peachR" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#f8cdb0"/>
      <stop offset="100%" stop-color="#e8a37b"/>
    </radialGradient>
    <linearGradient id="leafG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7ca24b"/>
      <stop offset="100%" stop-color="#4f7029"/>
    </linearGradient>
    <linearGradient id="leafG2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9fbb63"/>
      <stop offset="100%" stop-color="#5f8233"/>
    </linearGradient>
  </defs>

  <!-- ============ FOLIAGE BASE LAYER ============ -->
  <g opacity="0.9">
    <ellipse cx="120" cy="70" rx="60" ry="20" fill="url(#leafG)" transform="rotate(-28 120 70)"/>
    <ellipse cx="250" cy="50" rx="55" ry="18" fill="url(#leafG2)" transform="rotate(18 250 50)"/>
    <ellipse cx="420" cy="40" rx="58" ry="18" fill="url(#leafG)" transform="rotate(-14 420 40)"/>
    <ellipse cx="600" cy="35" rx="50" ry="16" fill="url(#leafG2)" transform="rotate(22 600 35)"/>
    <ellipse cx="780" cy="38" rx="56" ry="18" fill="url(#leafG)" transform="rotate(-20 780 38)"/>
    <ellipse cx="960" cy="45" rx="54" ry="17" fill="url(#leafG2)" transform="rotate(16 960 45)"/>
    <ellipse cx="1130" cy="55" rx="58" ry="19" fill="url(#leafG)" transform="rotate(-24 1130 55)"/>
    <ellipse cx="1280" cy="75" rx="60" ry="20" fill="url(#leafG2)" transform="rotate(20 1280 75)"/>
    <ellipse cx="180" cy="140" rx="48" ry="15" fill="url(#leafG2)" transform="rotate(34 180 140)"/>
    <ellipse cx="520" cy="120" rx="46" ry="15" fill="url(#leafG)" transform="rotate(-30 520 120)"/>
    <ellipse cx="880" cy="125" rx="48" ry="15" fill="url(#leafG2)" transform="rotate(28 880 125)"/>
    <ellipse cx="1220" cy="140" rx="46" ry="15" fill="url(#leafG)" transform="rotate(-32 1220 140)"/>
  </g>

  <!-- ============ WISTERIA — left cascade ============ -->
  <g opacity="0.92">
    <ellipse cx="70" cy="150" rx="9" ry="22" fill="#b18fd0"/>
    <ellipse cx="58" cy="178" rx="8" ry="19" fill="#a47fc6"/>
    <ellipse cx="80" cy="195" rx="7" ry="17" fill="#c2a3dd"/>
    <ellipse cx="62" cy="215" rx="7" ry="15" fill="#b18fd0"/>
    <ellipse cx="84" cy="232" rx="6" ry="13" fill="#a47fc6"/>
    <ellipse cx="66" cy="248" rx="5" ry="11" fill="#c2a3dd"/>
    <ellipse cx="86" cy="262" rx="5" ry="10" fill="#b18fd0"/>
  </g>

  <!-- ============ RED BERRIES — right cascade ============ -->
  <g opacity="0.95">
    <circle cx="1330" cy="150" r="7" fill="#8a1f1f"/>
    <circle cx="1342" cy="166" r="6.5" fill="#761818"/>
    <circle cx="1324" cy="178" r="7" fill="#8a1f1f"/>
    <circle cx="1346" cy="190" r="6" fill="#6a1414"/>
    <circle cx="1330" cy="202" r="6.5" fill="#8a1f1f"/>
    <circle cx="1320" cy="214" r="5.5" fill="#761818"/>
    <circle cx="1340" cy="222" r="5" fill="#8a1f1f"/>
  </g>

  <!-- ============ FLOWERS ============ -->
  <!-- Helper pattern: layered ellipse petals + center -->

  <!-- Orange poppy (left) -->
  <g transform="translate(150,120)">
    <g opacity="0.96">
      <ellipse rx="42" ry="38" fill="url(#poppyR)" transform="rotate(-15)"/>
      <ellipse rx="40" ry="36" fill="url(#poppyR)" transform="rotate(35)"/>
      <ellipse rx="38" ry="34" fill="url(#poppyR)" transform="rotate(85)"/>
      <ellipse rx="40" ry="36" fill="url(#poppyR)" transform="rotate(130)"/>
      <circle r="11" fill="#2a1206"/>
      <circle r="7" fill="#160a02"/>
    </g>
  </g>

  <!-- Pink peony (left-center) -->
  <g transform="translate(270,95)">
    <ellipse rx="46" ry="40" fill="url(#pinkR)" transform="rotate(10)"/>
    <ellipse rx="42" ry="36" fill="url(#pinkR)" transform="rotate(55)"/>
    <ellipse rx="40" ry="34" fill="url(#pinkR)" transform="rotate(100)"/>
    <ellipse rx="42" ry="36" fill="url(#pinkR)" transform="rotate(145)"/>
    <circle r="12" fill="#e0b34a"/>
    <circle r="7" fill="#c1922f"/>
  </g>

  <!-- Marigold (center-left) -->
  <g transform="translate(400,70)">
    <g opacity="0.96">
      <ellipse rx="30" ry="27" fill="url(#marigoldR)" transform="rotate(0)"/>
      <ellipse rx="30" ry="27" fill="url(#marigoldR)" transform="rotate(40)"/>
      <ellipse rx="30" ry="27" fill="url(#marigoldR)" transform="rotate(80)"/>
      <ellipse rx="30" ry="27" fill="url(#marigoldR)" transform="rotate(120)"/>
      <ellipse rx="30" ry="27" fill="url(#marigoldR)" transform="rotate(160)"/>
      <circle r="9" fill="#7a4a10"/>
    </g>
  </g>

  <!-- Green succulent rose (top center) -->
  <g transform="translate(530,55)">
    <ellipse rx="28" ry="23" fill="#7d9a52" transform="rotate(0)"/>
    <ellipse rx="25" ry="20" fill="#8fa962" transform="rotate(45)"/>
    <ellipse rx="22" ry="18" fill="#9fb873" transform="rotate(90)"/>
    <ellipse rx="20" ry="16" fill="#8fa962" transform="rotate(135)"/>
    <circle r="9" fill="#637e3a"/>
  </g>

  <!-- Peach carnation (center) -->
  <g transform="translate(650,80)">
    <ellipse rx="34" ry="29" fill="#f1b48f" transform="rotate(0)"/>
    <ellipse rx="31" ry="26" fill="#e8a37b" transform="rotate(36)"/>
    <ellipse rx="34" ry="29" fill="#f6bd9a" transform="rotate(72)"/>
    <ellipse rx="31" ry="26" fill="#e8a37b" transform="rotate(108)"/>
    <ellipse rx="34" ry="29" fill="#f1b48f" transform="rotate(144)"/>
    <circle r="8" fill="#c97f56"/>
  </g>

  <!-- Fuchsia bloom (center-right) -->
  <g transform="translate(780,68)">
    <ellipse rx="38" ry="33" fill="url(#fuchsiaR)" transform="rotate(15)"/>
    <ellipse rx="35" ry="30" fill="url(#fuchsiaR)" transform="rotate(60)"/>
    <ellipse rx="33" ry="28" fill="url(#fuchsiaR)" transform="rotate(105)"/>
    <ellipse rx="35" ry="30" fill="url(#fuchsiaR)" transform="rotate(150)"/>
    <circle r="11" fill="#f0c84a"/>
    <circle r="6" fill="#d4a830"/>
  </g>

  <!-- Pink poppy (right-center) -->
  <g transform="translate(910,90)">
    <ellipse rx="40" ry="35" fill="url(#pinkR)" transform="rotate(-10)"/>
    <ellipse rx="38" ry="33" fill="url(#pinkR)" transform="rotate(40)"/>
    <ellipse rx="36" ry="31" fill="url(#pinkR)" transform="rotate(90)"/>
    <ellipse rx="38" ry="33" fill="url(#pinkR)" transform="rotate(140)"/>
    <circle r="10" fill="#cdc046"/>
    <circle r="6" fill="#a89a30"/>
  </g>

  <!-- Lemons (right) -->
  <g transform="translate(1060,80)">
    <ellipse rx="40" ry="30" fill="url(#lemonR)" transform="rotate(-18)"/>
    <ellipse cx="36" cy="-7" rx="8" ry="5" fill="#cdaf24" transform="rotate(-18)"/>
    <ellipse cx="-36" cy="7" rx="6" ry="4" fill="#cdaf24" transform="rotate(-18)"/>
    <ellipse cx="14" cy="-34" rx="18" ry="8" fill="url(#leafG)" transform="rotate(25)"/>
  </g>
  <g transform="translate(1135,120)">
    <ellipse rx="37" ry="27" fill="url(#lemonR)" transform="rotate(12)"/>
    <ellipse cx="34" cy="6" rx="7" ry="4" fill="#cdaf24" transform="rotate(12)"/>
    <ellipse cx="-34" cy="-6" rx="5" ry="3" fill="#cdaf24" transform="rotate(12)"/>
  </g>

  <!-- Deep magenta peony (far right) -->
  <g transform="translate(1230,95)">
    <ellipse rx="42" ry="36" fill="url(#fuchsiaR)" transform="rotate(8)"/>
    <ellipse rx="38" ry="32" fill="url(#fuchsiaR)" transform="rotate(52)"/>
    <ellipse rx="36" ry="30" fill="url(#fuchsiaR)" transform="rotate(96)"/>
    <ellipse rx="38" ry="32" fill="url(#fuchsiaR)" transform="rotate(140)"/>
    <circle r="11" fill="#e8b34a"/>
    <circle r="6" fill="#c1922f"/>
  </g>

  <!-- Small accent blooms & buds -->
  <g transform="translate(210,180)">
    <circle cx="0" cy="-8" r="6" fill="#f8f0dc"/>
    <circle cx="8" cy="-3" r="6" fill="#f8f0dc"/>
    <circle cx="6" cy="6" r="6" fill="#f8f0dc"/>
    <circle cx="-6" cy="6" r="6" fill="#f8f0dc"/>
    <circle cx="-8" cy="-3" r="6" fill="#f8f0dc"/>
    <circle r="6" fill="#ecd35e"/>
  </g>
  <g transform="translate(1000,170)">
    <circle cx="0" cy="-7" r="5" fill="#f8f0dc"/>
    <circle cx="7" cy="-2" r="5" fill="#f8f0dc"/>
    <circle cx="5" cy="6" r="5" fill="#f8f0dc"/>
    <circle cx="-5" cy="6" r="5" fill="#f8f0dc"/>
    <circle cx="-7" cy="-2" r="5" fill="#f8f0dc"/>
    <circle r="5" fill="#ecd35e"/>
  </g>

  <!-- Small lavender sprigs -->
  <g transform="translate(480,140)" opacity="0.85">
    <circle cx="0" cy="0" r="5" fill="#b597d6"/>
    <circle cx="9" cy="-7" r="4" fill="#c8aade"/>
    <circle cx="-7" cy="-9" r="4" fill="#b597d6"/>
    <circle cx="4" cy="-17" r="3" fill="#a886c8"/>
  </g>
  <g transform="translate(840,150)" opacity="0.85">
    <circle cx="0" cy="0" r="5" fill="#b597d6"/>
    <circle cx="8" cy="-7" r="4" fill="#c8aade"/>
    <circle cx="-6" cy="-9" r="4" fill="#b597d6"/>
  </g>

  <!-- Orange lily (lower left accent) -->
  <g transform="translate(330,165)" opacity="0.95">
    <ellipse rx="26" ry="13" fill="url(#poppyR)" transform="rotate(20)"/>
    <ellipse rx="26" ry="13" fill="url(#poppyR)" transform="rotate(80)"/>
    <ellipse rx="26" ry="13" fill="url(#poppyR)" transform="rotate(140)"/>
    <circle r="6" fill="#7a3a10"/>
  </g>
</svg>
